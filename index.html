<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 CASINO ROYALE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .casino {
            max-width: 800px;
            margin: 0 auto;
            background: radial-gradient(ellipse at center, rgba(26, 26, 62, 0.95) 0%, rgba(13, 13, 26, 0.98) 100%);
            border: 3px solid #ffd700;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
        }
        h1 { color: #ffd700; text-align: center; font-size: 38px; margin-bottom: 20px; }
        input {
            padding: 12px 20px;
            border-radius: 10px;
            border: 2px solid #ffd700;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            outline: none;
            margin: 5px;
        }
        input::placeholder { color: #888; }
        button {
            background: #ffd700;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #1a1a3e;
            margin: 5px;
        }
        button:hover { transform: scale(1.05); }
        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats span { color: #ffd700; font-weight: bold; font-size: 22px; }
        .reels {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .reel {
            width: 130px;
            height: 160px;
            background: linear-gradient(180deg, #1a1a3a, #0a0a1a);
            border: 3px solid #ffd700;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 85px;
            transition: all 0.3s;
        }
        .reel.spinning { animation: spin 0.12s linear infinite; }
        @keyframes spin {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(360deg); }
        }
        .reel.winner {
            animation: winPulse 0.5s ease 3;
            border-color: #ff6b00;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
        }
        @keyframes winPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 80px rgba(255, 215, 0, 1); transform: scale(1.08); }
        }
        .bet-control {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 15px 0;
        }
        .bet-control button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 24px;
        }
        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            font-size: 28px;
            padding: 18px 60px;
            border-radius: 50px;
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            display: block;
        }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            color: #ffd700;
            text-align: center;
            font-size: 22px;
            min-height: 45px;
            margin: 15px 0;
        }
        .reset-btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 10px 30px;
            border-radius: 10px;
            cursor: pointer;
        }
        .reset-btn:hover { background: #ff4444; color: white; }
        .leaderboard-section {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #ffd70044;
        }
        .leaderboard-section h2 { color: #ffd700; text-align: center; margin-bottom: 15px; }
        .leaderboard-section li {
            color: white;
            padding: 8px 0;
            border-bottom: 1px solid #ffffff22;
            list-style: none;
        }
        .auth-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid #ffd70033;
            margin-bottom: 15px;
        }
        .user-info {
            color: #ffd700;
            text-align: center;
            padding: 15px;
            font-size: 18px;
        }
        .user-info span { color: #fff; }
        .history {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ffffff22;
        }
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        @media (max-width: 600px) {
            .reel { width: 80px; height: 100px; font-size: 50px; }
            .casino { padding: 15px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="confetti-container" id="confettiContainer"></div>

    <div class="casino">
        <h1>🎰 CASINO ROYALE</h1>
        
        <!-- АВТОРИЗАЦИЯ -->
        <div id="authSection">
            <div class="auth-container">
                <input type="text" id="regUsername" placeholder="👤 Имя">
                <input type="email" id="regEmail" placeholder="📧 Email">
                <input type="password" id="regPassword" placeholder="🔒 Пароль">
                <button onclick="window.registerUser()">📝 Регистрация</button>
            </div>
            <div class="auth-container">
                <input type="email" id="loginEmail" placeholder="📧 Email">
                <input type="password" id="loginPassword" placeholder="🔒 Пароль">
                <button onclick="window.loginUser()">🔑 Вход</button>
            </div>
        </div>
        
        <div id="userInfo" style="display:none;">
            <div class="user-info">
                👋 Привет, <span id="displayUsername"></span>!
                <button onclick="window.logoutUser()" style="background:#ff4444;color:white;padding:8px 25px;">🚪 Выйти</button>
            </div>
        </div>
        
        <!-- ИГРА -->
        <div id="gameSection" style="display:none;">
            <div class="stats">
                <div>💰 Баланс: <span id="balance">1000</span>$</div>
                <div>🏆 Выигрыш: <span id="lastWin">0</span>$</div>
                <div>🎯 Спинов: <span id="spins">0</span></div>
            </div>
            
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
            
            <div class="bet-control">
                <button onclick="window.changeBet(-5)">−</button>
                <span>Ставка: <span id="bet">10</span>$</span>
                <button onclick="window.changeBet(5)">+</button>
            </div>
            
            <button class="spin-btn" id="spinBtn" onclick="window.spin()">🎲 SPIN</button>
            
            <div class="message" id="message">💃 Начни игру!</div>
            
            <button class="reset-btn" onclick="window.resetGame()">🔄 Сбросить прогресс</button>
            
            <div class="history" id="history">История: </div>
        </div>
        
        <!-- ТАБЛИЦА ЛИДЕРОВ -->
        <div class="leaderboard-section">
            <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
            <div id="leaderboard"><p style="color:#888;text-align:center;">⏳ Загрузка...</p></div>
        </div>
    </div>

    <script>
        // ============================================
        //  SUPABASE НАСТРОЙКИ
        // ============================================
        
        const SUPABASE_URL = 'https://bxjuvzyxspcavnpcfytj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qsUmLkXOfCa6359Ywg5sUQ-_MOTJ_';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        //  ПЕРЕМЕННЫЕ
        // ============================================
        
        let currentUser = null;
        let userBalance = 1000;
        let userSpins = 0;
        let currentUsername = '';
        let bet = 10;
        let isSpinning = false;
        let lastWin = 0;
        let history = [];
        
        const symbols = ['🍒', '🍋', '🍊', '🍇', '💎', '7️⃣', '⭐', '🎰'];
        const winTable = {
            '🍒': 12, '🍋': 18, '🍊': 25, '🍇': 30,
            '💎': 60, '7️⃣': 120, '⭐': 90, '🎰': 250
        };
        const symbolWeights = {
            '🍒': 20, '🍋': 18, '🍊': 16, '🍇': 14,
            '💎': 12, '⭐': 10, '7️⃣': 6, '🎰': 4
        };
        
        function getWeightedSymbol() {
            const total = Object.values(symbolWeights).reduce((a,b) => a+b, 0);
            let r = Math.random() * total;
            for (const [s, w] of Object.entries(symbolWeights)) {
                r -= w;
                if (r <= 0) return s;
            }
            return '🍒';
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = userBalance;
            document.getElementById('bet').textContent = bet;
            document.getElementById('spins').textContent = userSpins;
            document.getElementById('lastWin').textContent = lastWin;
        }
        
        // ============================================
        //  АВТОРИЗАЦИЯ (ГЛОБАЛЬНЫЕ ФУНКЦИИ)
        // ============================================
        
        window.registerUser = async function() {
            console.log('📝 Регистрация');
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            
            if (!username || !email || !password) {
                alert('⚠️ Заполните все поля!');
                return;
            }
            if (password.length < 6) {
                alert('⚠️ Пароль минимум 6 символов!');
                return;
            }
            
            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { username } }
                });
                if (authError) throw authError;
                
                if (authData.user) {
                    await supabase.from('users').insert([{
                        id: authData.user.id,
                        username, email,
                        balance: 1000,
                        total_spins: 0
                    }]);
                    alert('✅ Регистрация успешна! Теперь войдите.');
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                }
            } catch (e) {
                alert('❌ Ошибка: ' + e.message);
            }
        };
        
        window.loginUser = async function() {
            console.log('🔑 Вход');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                alert('⚠️ Введите email и пароль!');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                if (data.user) {
                    currentUser = data.user;
                    await loadUserData();
                    showGame();
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                }
            } catch (e) {
                alert('❌ Неверный email или пароль!');
            }
        };
        
        window.logoutUser = async function() {
            console.log('🚪 Выход');
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('gameSection').style.display = 'none';
        };
        
        async function loadUserData() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            if (data) {
                userBalance = data.balance || 1000;
                userSpins = data.total_spins || 0;
                currentUsername = data.username || 'Игрок';
                document.getElementById('displayUsername').textContent = currentUsername;
                updateUI();
            }
        }
        
        async function saveUserData() {
            if (!currentUser) return;
            await supabase
                .from('users')
                .update({ balance: userBalance, total_spins: userSpins })
                .eq('id', currentUser.id);
        }
        
        function showGame() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('gameSection').style.display = 'block';
            updateUI();
            fetchLeaderboard();
        }
        
        // ============================================
        //  ИГРА (ГЛОБАЛЬНЫЕ ФУНКЦИИ)
        // ============================================
        
        window.changeBet = function(amount) {
            if (isSpinning) return;
            let newBet = bet + amount;
            if (newBet >= 1 && newBet <= userBalance) {
                bet = newBet;
                updateUI();
            }
        };
        
        window.spin = async function() {
            if (isSpinning) return;
            if (!currentUser) {
                alert('⚠️ Войдите в аккаунт!');
                return;
            }
            if (userBalance < bet) {
                document.getElementById('message').textContent = '❌ Недостаточно средств!';
                return;
            }
            
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('message').textContent = '🎰 Крутим...';
            
            userBalance -= bet;
            userSpins++;
            
            const reels = [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3')
            ];
            
            reels.forEach(r => { r.classList.add('spinning'); r.classList.remove('winner'); });
            
            const delays = [600, 900, 1200];
            let results = [];
            
            delays.forEach((delay, i) => {
                setTimeout(() => {
                    const symbol = getWeightedSymbol();
                    results[i] = symbol;
                    reels[i].textContent = symbol;
                    reels[i].classList.remove('spinning');
                    if (results.length === 3) checkResult(results, reels);
                }, delay);
            });
        };
        
        async function checkResult(results, reels) {
            let winAmount = 0;
            
            if (results[0] === results[1] && results[1] === results[2]) {
                winAmount = winTable[results[0]] * Math.ceil(bet / 10);
            }
            if (results.includes('7️⃣') && results.includes('💎') && results.includes('⭐')) {
                winAmount = Math.max(winAmount, bet * 8);
            }
            if (results.filter(s => s === '🎰').length === 2) {
                winAmount = Math.max(winAmount, bet * 5);
            }
            if (results[0] === results[1] && results[0] !== results[2]) {
                winAmount = Math.max(winAmount, Math.floor(bet * 1.5));
            }
            if (results[1] === results[2] && results[1] !== results[0]) {
                winAmount = Math.max(winAmount, Math.floor(bet * 1.5));
            }
            
            if (winAmount > 0) {
                userBalance += winAmount;
                lastWin = winAmount;
                document.getElementById('message').textContent = `🎉 ВЫИГРЫШ ${winAmount}$! 🎉`;
                
                reels.forEach(r => {
                    r.classList.add('winner');
                    setTimeout(() => r.classList.remove('winner'), 1800);
                });
                
                launchConfetti();
                playWinSound();
                
                if (currentUser && currentUsername) {
                    await supabase.from('leaderboard').insert([{
                        user_id: currentUser.id,
                        player_name: currentUsername,
                        score: winAmount
                    }]);
                    fetchLeaderboard();
                }
            } else {
                lastWin = 0;
                document.getElementById('message').textContent = '😔 Попробуй ещё!';
            }
            
            updateUI();
            await saveUserData();
            
            history.push(`${results.join(' ')} ${winAmount > 0 ? '💎+' + winAmount : '❌'}`);
            if (history.length > 12) history.shift();
            document.getElementById('history').textContent = 'История: ' + history.join(' | ');
            
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            
            if (userBalance <= 0) {
                document.getElementById('message').textContent = '💸 ТЫ ПРОИГРАЛ ВСЁ!';
                document.getElementById('spinBtn').disabled = true;
            }
        }
        
        window.resetGame = async function() {
            if (isSpinning) return;
            if (!currentUser) { alert('⚠️ Войдите в аккаунт!'); return; }
            if (!confirm('Сбросить прогресс?')) return;
            
            userBalance = 1000;
            userSpins = 0;
            history = [];
            lastWin = 0;
            await saveUserData();
            updateUI();
            document.getElementById('message').textContent = '🔄 Прогресс сброшен!';
            document.getElementById('history').textContent = 'История: ';
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('reel1').textContent = '🍒';
            document.getElementById('reel2').textContent = '🍒';
            document.getElementById('reel3').textContent = '🍒';
        };
        
        // ============================================
        //  КОНФЕТТИ И ЗВУК
        // ============================================
        
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffd700', '#ff6b00', '#ff0040', '#00ff80', '#00bfff', '#ff00ff'];
            for (let i = 0; i < 100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (Math.random() * 8 + 5) + 'px';
                c.style.height = (Math.random() * 8 + 5) + 'px';
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                c.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }
        
        function playWinSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        gain.gain.value = 0.15;
                        osc.start();
                        setTimeout(() => osc.stop(), 150);
                    }, i * 150);
                });
            } catch(e) {}
        }
        
        // ============================================
        //  ТАБЛИЦА ЛИДЕРОВ
        // ============================================
        
        async function fetchLeaderboard() {
            try {
                const { data, error } = await supabase
                    .from('leaderboard')
                    .select('player_name, score')
                    .order('score', { ascending: false })
                    .limit(10);
                if (error) throw error;
                
                const div = document.getElementById('leaderboard');
                if (!data || data.length === 0) {
                    div.innerHTML = '<p style="color:#888;text-align:center;">Пока нет рекордов.</p>';
                    return;
                }
                let html = '';
                data.forEach((entry, i) => {
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
                    html += `<li>${medal} <strong>${entry.player_name}</strong>: ${entry.score}$</li>`;
                });
                div.innerHTML = html;
            } catch (e) {
                document.getElementById('leaderboard').innerHTML = 
                    '<p style="color:#ff4444;text-align:center;">❌ Ошибка загрузки</p>';
            }
        }
        
        // ============================================
        //  ЗАГРУЗКА СТРАНИЦЫ
        // ============================================
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Игра загружена!');
            
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                await loadUserData();
                showGame();
            }
            fetchLeaderboard();
        });
        
        // Обновление таблицы в реальном времени
        supabase
            .channel('leaderboard-changes')
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'leaderboard' },
                () => fetchLeaderboard()
            )
            .subscribe();
    </script>
</body>
</html>
