<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #0b0e14;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 420px;
            width: 100%;
            background: #151e27;
            border-radius: 28px;
            padding: 20px 18px 30px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
            color: #e8edf2;
            position: relative;
            border: 1px solid #2a3846;
        }
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #1b2631;
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 18px;
            border: 1px solid #2f4050;
        }
        .avatar {
            font-size: 40px;
            background: #263544;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f5b342;
        }
        .avatar-info {
            flex: 1;
        }
        .avatar-info .name {
            font-weight: 700;
            font-size: 18px;
            color: #f5b342;
        }
        .avatar-info .title {
            font-size: 13px;
            color: #a0b3c4;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            background: #1b2631;
            border-radius: 16px;
            padding: 12px 6px;
            margin-bottom: 16px;
            border: 1px solid #2a3846;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #7e96ab;
            letter-spacing: 0.5px;
        }
        .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #f5b342;
        }
        .stat-box .value.green {
            color: #6fcf97;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            background: #1b2631;
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 18px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #7e96ab;
            padding: 10px 0;
            border-radius: 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #f5b342;
            color: #0b0e14;
        }
        .tab-btn:hover {
            background: #2f4050;
            color: #e8edf2;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .job-card {
            background: #1b2631;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #2a3846;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .job-card .info .name {
            font-weight: 600;
            font-size: 16px;
        }
        .job-card .info .desc {
            font-size: 12px;
            color: #7e96ab;
        }
        .job-card .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
            background: #2f4050;
            color: #e8edf2;
        }
        .btn-primary {
            background: #f5b342;
            color: #0b0e14;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-success {
            background: #6fcf97;
            color: #0b0e14;
        }
        .btn-danger {
            background: #eb5757;
            color: #fff;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .shop-item {
            background: #1b2631;
            border-radius: 16px;
            padding: 14px 12px;
            border: 1px solid #2a3846;
            text-align: center;
        }
        .shop-item .icon {
            font-size: 32px;
        }
        .shop-item .sname {
            font-weight: 600;
            font-size: 14px;
            margin: 4px 0 2px;
        }
        .shop-item .sdesc {
            font-size: 11px;
            color: #7e96ab;
        }
        .shop-item .slvl {
            font-size: 12px;
            color: #f5b342;
        }
        .shop-item .sprice {
            font-size: 13px;
            font-weight: 600;
            color: #6fcf97;
            margin: 6px 0 8px;
        }

        .slot-machine {
            background: #0f1720;
            border-radius: 18px;
            padding: 20px 12px;
            border: 1px solid #2a3846;
        }
        .reels {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 14px;
        }
        .reel {
            width: 80px;
            height: 96px;
            background: #1b2631;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 2px solid #2f4050;
            transition: 0.15s;
        }
        .reel.spinning {
            animation: spin 0.12s linear infinite;
        }
        @keyframes spin {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        .reel.winner {
            border-color: #f5b342;
            box-shadow: 0 0 24px rgba(245, 179, 66, 0.4);
        }
        .slot-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .slot-controls .bet-label {
            font-size: 14px;
            color: #a0b3c4;
        }
        .slot-message {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #f5b342;
            margin-top: 12px;
            min-height: 24px;
        }

        .history-box {
            background: #0f1720;
            border-radius: 14px;
            padding: 12px 14px;
            margin-top: 16px;
            font-size: 12px;
            color: #7e96ab;
            max-height: 56px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            border: 1px solid #1f2e3c;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b2631;
            border: 1px solid #f5b342;
            color: #e8edf2;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 440px) {
            .reel { width: 64px; height: 78px; font-size: 38px; }
            .shop-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <!-- АВАТАР -->
    <div class="avatar-section">
        <div class="avatar">🧑‍💼</div>
        <div class="avatar-info">
            <div class="name" id="playerName">Новичок</div>
            <div class="title" id="playerTitle">Безработный</div>
        </div>
        <div style="font-size:13px; color:#7e96ab;" id="levelDisplay">Ур. 1</div>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-grid">
        <div class="stat-box">
            <div class="label">💰 Баланс</div>
            <div class="value" id="balanceDisplay">50</div>
        </div>
        <div class="stat-box">
            <div class="label">📈 Доход/сек</div>
            <div class="value green" id="incomeDisplay">0</div>
        </div>
        <div class="stat-box">
            <div class="label">🎯 Спинов</div>
            <div class="value" id="spinCountDisplay">0</div>
        </div>
    </div>

    <!-- ВКЛАДКИ -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="work">💼 Работа</button>
        <button class="tab-btn" data-tab="shop">🛒 Улучшения</button>
        <button class="tab-btn" data-tab="slot">🎰 Слот</button>
    </div>

    <!-- РАБОТА -->
    <div class="tab-content active" id="tab-work">
        <div id="jobList"></div>
        <button class="btn btn-success" style="width:100%; margin-top:6px;" onclick="work()">💪 Работать сейчас</button>
    </div>

    <!-- МАГАЗИН -->
    <div class="tab-content" id="tab-shop">
        <div class="shop-grid" id="shopGrid"></div>
    </div>

    <!-- СЛОТ -->
    <div class="tab-content" id="tab-slot">
        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
            <div class="slot-controls">
                <button class="btn btn-sm" id="betDown">−</button>
                <span class="bet-label">Ставка: <strong id="betDisplay">2</strong>$</span>
                <button class="btn btn-sm" id="betUp">+</button>
                <button class="btn btn-primary" id="spinBtn">🎲 SPIN</button>
            </div>
            <div class="slot-message" id="slotMessage">Крути и выигрывай!</div>
        </div>
        <div class="history-box" id="historyBox">📜 История: пока пусто</div>
    </div>

</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
    // ============================================================
    //  ДАННЫЕ
    // ============================================================

    const jobs = [
        { id: 0, name: 'Безработный', baseIncome: 0, cost: 0 },
        { id: 1, name: 'Разносчик', baseIncome: 1, cost: 30 },
        { id: 2, name: 'Уборщик', baseIncome: 2, cost: 80 },
        { id: 3, name: 'Официант', baseIncome: 4, cost: 200 },
        { id: 4, name: 'Курьер', baseIncome: 7, cost: 450 },
        { id: 5, name: 'Продавец', baseIncome: 12, cost: 900 },
        { id: 6, name: 'Водитель', baseIncome: 20, cost: 1800 },
        { id: 7, name: 'Менеджер', baseIncome: 35, cost: 3800 },
        { id: 8, name: 'Директор', baseIncome: 60, cost: 7500 },
        { id: 9, name: 'Магнат', baseIncome: 110, cost: 16000 },
        { id: 10, name: 'Легенда', baseIncome: 220, cost: 35000 }
    ];

    const upgrades = [
        { id: 'incomeMult', name: '💼 Зарплата +', icon: '📈', desc: '+15% доход', baseCost: 20, costMult: 1.5, maxLvl: 30 },
        { id: 'slotBonus', name: '🎰 Бонус слота', icon: '🎯', desc: '+8% выигрыш', baseCost: 25, costMult: 1.6, maxLvl: 25 },
        { id: 'luck', name: '🍀 Удача', icon: '🍀', desc: '+3% шанс', baseCost: 30, costMult: 1.7, maxLvl: 20 }
    ];

    const symbols = ['🍒', '🍋', '🍊', '🍇', '💎', '7️⃣', '⭐', '🎰'];
    const winMap = { '🍒': 4, '🍋': 6, '🍊': 8, '🍇': 12, '💎': 25, '7️⃣': 50, '⭐': 35, '🎰': 80 };

    // ============================================================
    //  СОСТОЯНИЕ
    // ============================================================

    let G = {
        balance: 50,
        totalEarned: 0,
        jobId: 0,
        incomeMult: 1,
        slotBonus: 0,
        luck: 0,
        spins: 0,
        totalWins: 0,
        totalLosses: 0,
        biggestWin: 0,
        lastWin: 0,
        bet: 2,
        isSpinning: false,
        history: []
    };

    // Уровни улучшений
    let upgradeLevels = { incomeMult: 0, slotBonus: 0, luck: 0 };

    // ============================================================
    //  СОХРАНЕНИЕ
    // ============================================================

    function save() {
        const data = { ...G, upgradeLevels };
        localStorage.setItem('idleLifeSave', JSON.stringify(data));
    }

    function load() {
        try {
            const raw = localStorage.getItem('idleLifeSave');
            if (!raw) return false;
            const data = JSON.parse(raw);
            Object.assign(G, data);
            if (data.upgradeLevels) upgradeLevels = data.upgradeLevels;
            return true;
        } catch { return false; }
    }

    // ============================================================
    //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================

    function getJob() { return jobs[G.jobId] || jobs[0]; }

    function getIncome() {
        const base = getJob().baseIncome;
        const mult = G.incomeMult || 1;
        const bonus = 1 + (G.slotBonus || 0) * 0.08;
        return Math.floor(base * mult * bonus);
    }

    function getUpgradeCost(id) {
        const up = upgrades.find(u => u.id === id);
        const lvl = upgradeLevels[id] || 0;
        return Math.floor(up.baseCost * Math.pow(up.costMult, lvl));
    }

    function getMaxLvl(id) {
        const up = upgrades.find(u => u.id === id);
        return up.maxLvl;
    }

    function notify(text, isGood = true) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = text;
        if (!isGood) el.style.borderColor = '#eb5757';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2400);
    }

    // ============================================================
    //  UI ОБНОВЛЕНИЕ
    // ============================================================

    function updateUI() {
        const job = getJob();
        document.getElementById('playerName').textContent = job.name;
        document.getElementById('playerTitle').textContent = job.id === 0 ? 'Начинающий' : 'Работник';
        document.getElementById('levelDisplay').textContent = `Ур. ${job.id + 1}`;
        document.getElementById('balanceDisplay').textContent = Math.floor(G.balance);
        document.getElementById('incomeDisplay').textContent = getIncome();
        document.getElementById('spinCountDisplay').textContent = G.spins;
        document.getElementById('betDisplay').textContent = G.bet;

        renderJobs();
        renderShop();
        renderHistory();
        updateSlotButton();
    }

    function renderJobs() {
        const container = document.getElementById('jobList');
        let html = '';
        jobs.forEach((job, idx) => {
            const isCurrent = idx === G.jobId;
            const isUnlocked = idx <= G.jobId + 1;
            const canBuy = isUnlocked && G.balance >= job.cost && !isCurrent;

            html += `
                <div class="job-card" style="${isCurrent ? 'border-color:#f5b342;' : ''}">
                    <div class="info">
                        <div class="name">${job.name} ${isCurrent ? '⭐' : ''}</div>
                        <div class="desc">💰 ${job.baseIncome}$/сек</div>
                    </div>
                    <div class="actions">
                        ${isCurrent ? `<span style="font-size:12px;color:#6fcf97;">✅ Активна</span>` :
                         isUnlocked ? `<button class="btn btn-primary btn-sm" onclick="buyJob(${idx})" ${canBuy ? '' : 'disabled'}>${job.cost}$</button>` :
                         `<span style="font-size:11px;color:#7e96ab;">🔒</span>`}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderShop() {
        const container = document.getElementById('shopGrid');
        let html = '';
        upgrades.forEach(up => {
            const lvl = upgradeLevels[up.id] || 0;
            const maxed = lvl >= up.maxLvl;
            const cost = getUpgradeCost(up.id);
            const canBuy = G.balance >= cost && !maxed;

            let bonus = '';
            if (up.id === 'incomeMult') bonus = `+${lvl * 15}% доход`;
            else if (up.id === 'slotBonus') bonus = `+${lvl * 8}% выигрыш`;
            else if (up.id === 'luck') bonus = `+${lvl * 3}% удача`;

            html += `
                <div class="shop-item">
                    <div class="icon">${up.icon}</div>
                    <div class="sname">${up.name}</div>
                    <div class="sdesc">${up.desc}</div>
                    <div class="slvl">${maxed ? '✅ MAX' : `Ур. ${lvl}/${up.maxLvl}`}</div>
                    <div class="sprice">${maxed ? '—' : cost + '$'}</div>
                    <button class="btn btn-primary btn-sm" onclick="buyUpgrade('${up.id}')" ${canBuy ? '' : 'disabled'}>
                        ${maxed ? 'Готово' : 'Купить'}
                    </button>
                    <div style="font-size:11px;color:#6fcf97;margin-top:4px;">${bonus}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderHistory() {
        const el = document.getElementById('historyBox');
        if (G.history.length === 0) {
            el.textContent = '📜 История: пока пусто';
            return;
        }
        const last = G.history.slice(-10).join(' | ');
        el.textContent = '📜 ' + last;
    }

    function updateSlotButton() {
        const btn = document.getElementById('spinBtn');
        btn.disabled = G.isSpinning || G.balance < G.bet;
    }

    // ============================================================
    //  РАБОТА
    // ============================================================

    function buyJob(idx) {
        const job = jobs[idx];
        if (G.balance < job.cost) { notify('❌ Не хватает денег!', false); return; }
        G.balance -= job.cost;
        G.jobId = idx;
        save();
        updateUI();
        notify(`✅ Теперь ты ${job.name}!`);
    }

    function work() {
        const inc = getIncome();
        if (inc === 0) { notify('💤 У тебя нет работы!', false); return; }
        G.balance += inc;
        G.totalEarned += inc;
        save();
        updateUI();
        // маленькая анимация баланса
        const el = document.getElementById('balanceDisplay');
        el.style.color = '#6fcf97';
        setTimeout(() => el.style.color = '', 300);
    }

    // ============================================================
    //  МАГАЗИН
    // ============================================================

    function buyUpgrade(id) {
        const up = upgrades.find(u => u.id === id);
        const lvl = upgradeLevels[id] || 0;
        if (lvl >= up.maxLvl) { notify('⚠️ Максимальный уровень!', false); return; }
        const cost = getUpgradeCost(id);
        if (G.balance < cost) { notify('❌ Не хватает денег!', false); return; }

        G.balance -= cost;
        upgradeLevels[id] = (upgradeLevels[id] || 0) + 1;

        // Применяем эффект
        if (id === 'incomeMult') G.incomeMult = 1 + upgradeLevels.incomeMult * 0.15;
        else if (id === 'slotBonus') G.slotBonus = upgradeLevels.slotBonus;
        else if (id === 'luck') G.luck = upgradeLevels.luck;

        save();
        updateUI();
        notify(`✅ ${up.name} улучшен до ${upgradeLevels[id]} уровня!`);
    }

    // ============================================================
    //  СЛОТ
    // ============================================================

    function getWeightedSymbol() {
        const weights = { '🍒': 24, '🍋': 20, '🍊': 18, '🍇': 14, '💎': 10, '⭐': 8, '7️⃣': 4, '🎰': 2 };
        // Удача: увеличиваем шанс редких
        const luckBonus = G.luck || 0;
        if (Math.random() * 100 < luckBonus * 3) {
            const rare = ['💎', '7️⃣', '⭐', '🎰'];
            return rare[Math.floor(Math.random() * rare.length)];
        }
        const total = Object.values(weights).reduce((a, b) => a + b, 0);
        let r = Math.random() * total;
        for (const [sym, w] of Object.entries(weights)) {
            r -= w;
            if (r <= 0) return sym;
        }
        return '🍒';
    }

    function spin() {
        if (G.isSpinning) return;
        if (G.balance < G.bet) {
            document.getElementById('slotMessage').textContent = '❌ Не хватает денег!';
            return;
        }

        G.isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('slotMessage').textContent = '🎰 Крутим...';

        G.balance -= G.bet;
        G.spins++;

        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];

        reels.forEach(r => { r.classList.add('spinning'); r.classList.remove('winner'); });

        const delays = [500, 800, 1100];
        let results = [];

        delays.forEach((delay, idx) => {
            setTimeout(() => {
                const sym = getWeightedSymbol();
                results[idx] = sym;
                reels[idx].textContent = sym;
                reels[idx].classList.remove('spinning');

                if (results.length === 3) {
                    finishSpin(results, reels);
                }
            }, delay);
        });
    }

    function finishSpin(results, reels) {
        let win = 0;

        // Три одинаковых
        if (results[0] === results[1] && results[1] === results[2]) {
            win = winMap[results[0]] || 0;
        }
        // Спецкомбинации
        if (results.includes('7️⃣') && results.includes('💎') && results.includes('⭐')) {
            win = Math.max(win, 40);
        }
        if (results.filter(s => s === '🎰').length === 2) {
            win = Math.max(win, 25);
        }
        // Два одинаковых (малый бонус)
        if (results[0] === results[1] && results[0] !== results[2]) win = Math.max(win, 2);
        if (results[1] === results[2] && results[1] !== results[0]) win = Math.max(win, 2);

        // Бонус от улучшения слота
        win = Math.floor(win * (1 + G.slotBonus * 0.08));

        // Минимальная ставка 2, умножаем на ставку
        win = Math.floor(win * (G.bet / 2));

        if (win > 0) {
            G.balance += win;
            G.totalEarned += win;
            G.totalWins++;
            G.lastWin = win;
            if (win > G.biggestWin) G.biggestWin = win;

            document.getElementById('slotMessage').textContent = `🎉 +${win}$ !!!`;
            reels.forEach(r => r.classList.add('winner'));
            setTimeout(() => reels.forEach(r => r.classList.remove('winner')), 1200);
            launchConfetti();
            notify(`🎉 Выигрыш ${win}$!`);
        } else {
            G.totalLosses++;
            document.getElementById('slotMessage').textContent = '😔 Попробуй ещё!';
        }

        G.history.push(`${results.join('')} ${win > 0 ? '+' + win : '—'}`);
        if (G.history.length > 30) G.history.shift();

        G.isSpinning = false;
        save();
        updateUI();

        if (G.balance <= 0) {
            document.getElementById('slotMessage').textContent = '💸 Банкрот! Работай!';
            document.getElementById('spinBtn').disabled = true;
        }
    }

    function changeBet(delta) {
        if (G.isSpinning) return;
        let newBet = G.bet + delta;
        if (newBet < 1) newBet = 1;
        if (newBet > G.balance) newBet = G.balance;
        if (newBet > 200) newBet = 200;
        G.bet = newBet;
        document.getElementById('betDisplay').textContent = G.bet;
    }

    // ============================================================
    //  КОНФЕТТИ
    // ============================================================

    function launchConfetti() {
        const container = document.getElementById('confettiContainer');
        const colors = ['#f5b342', '#eb5757', '#6fcf97', '#2d9cdb', '#bb6bd9', '#f2994a'];
        for (let i = 0; i < 50; i++) {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.style.left = Math.random() * 100 + '%';
            el.style.background = colors[Math.floor(Math.random() * colors.length)];
            el.style.width = (Math.random() * 6 + 4) + 'px';
            el.style.height = (Math.random() * 6 + 4) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            el.style.animationDelay = (Math.random() * 1) + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }
    }

    // ============================================================
    //  ИДЛ-ДОХОД
    // ============================================================

    let idleTimer = null;

    function startIdle() {
        if (idleTimer) clearInterval(idleTimer);
        idleTimer = setInterval(() => {
            const inc = getIncome();
            if (inc > 0 && G.balance < 9999999) {
                G.balance += inc;
                G.totalEarned += inc;
                save();
                updateUI();
            }
        }, 1000);
    }

    // ============================================================
    //  КНОПКИ И ВКЛАДКИ
    // ============================================================

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        });
    });

    document.getElementById('spinBtn').addEventListener('click', spin);
    document.getElementById('betUp').addEventListener('click', () => changeBet(1));
    document.getElementById('betDown').addEventListener('click', () => changeBet(-1));

    // Клавиши
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); spin(); }
        if (e.code === 'ArrowUp') { e.preventDefault(); changeBet(1); }
        if (e.code === 'ArrowDown') { e.preventDefault(); changeBet(-1); }
        if (e.key === 'w' || e.key === 'W') { work(); }
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================

    window.addEventListener('load', function() {
        const loaded = load();
        if (loaded) {
            notify('💾 Прогресс загружен!');
        } else {
            notify('👋 Добро пожаловать в Idle Life!');
        }
        updateUI();
        startIdle();

        // Автосохранение
        setInterval(save, 8000);
    });

    window.addEventListener('beforeunload', save);
</script>
</body>
</html>
